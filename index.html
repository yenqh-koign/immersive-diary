    <!-- 启动 splash · 静谧纸页 (C 方案)：内联样式保证冷启动瞬间可用，无需等外部请求 -->
    <style id="app-splash-style">
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        background:
          radial-gradient(ellipse at 30% 20%, rgba(246, 194, 207, 0.18), transparent 55%),
          radial-gradient(ellipse at 75% 80%, rgba(232, 208, 184, 0.25), transparent 55%),
          #FFF5EC;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.6s ease-out;
      }
      #app-splash::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image: url('assets/noise-texture.png');
        background-size: 200px;
        opacity: 0.2;
        mix-blend-mode: multiply;
        pointer-events: none;
      }
      #app-splash::after {
        content: "";
        position: absolute;
        inset: 0;
        box-shadow: inset 0 0 60px rgba(120, 90, 70, 0.12);
        pointer-events: none;
      }
      #app-splash.is-leaving {
        opacity: 0;
        pointer-events: none;
      }
      #app-splash .splash-inner {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      #app-splash .splash-logo {
        width: 88px;
        height: 88px;
        border-radius: 22px;
        background-image: url('assets/app-preview.png');
        background-size: cover;
        background-position: center;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        filter: drop-shadow(0 4px 12px rgba(120, 90, 70, 0.18));
        opacity: 0;
        transform: scale(0.9);
        animation:
          splash-logo-fadein 0.9s cubic-bezier(0.22, 0.8, 0.32, 1) 0.05s forwards,
          splash-logo-float 3.5s ease-in-out 1s infinite;
      }
      @keyframes splash-logo-fadein {
        to { opacity: 1; transform: scale(1); }
      }
      @keyframes splash-logo-float {
        0%, 100% { transform: translateY(0) scale(1); }
        50% { transform: translateY(-3px) scale(1); }
      }
      #app-splash .splash-title {
        margin-top: 22px;
        font-size: 20px;
        font-weight: 400;
        letter-spacing: 6px;
        color: #6B4A3A;
        font-family: "LXGW WenKai Mono TC", "Noto Serif SC", "STKaiti", "KaiTi", serif;
        opacity: 0;
        animation: splash-title-in 0.9s ease-out 0.3s forwards;
      }
      @keyframes splash-title-in {
        0%   { opacity: 0; letter-spacing: 14px; transform: translateY(4px); }
        100% { opacity: 1; letter-spacing: 6px; transform: translateY(0); }
      }
      #app-splash .splash-pen {
        position: absolute;
        bottom: -44px;
        left: 50%;
        transform: translateX(-50%);
        width: 200px;
        height: 14px;
      }
      #app-splash .splash-pen svg {
        width: 100%;
        height: 100%;
        overflow: visible;
      }
      #app-splash .splash-pen path {
        fill: none;
        stroke: #C48A6A;
        stroke-width: 1.6;
        stroke-linecap: round;
        stroke-dasharray: 220;
        stroke-dashoffset: 220;
        animation: splash-pen-draw 1.2s cubic-bezier(0.45, 0.05, 0.15, 1) 0.9s forwards;
        filter: drop-shadow(0 1px 1px rgba(120, 70, 40, 0.2));
      }
      @keyframes splash-pen-draw {
        to { stroke-dashoffset: 0; }
      }
      @media (prefers-reduced-motion: reduce) {
        #app-splash .splash-logo,
        #app-splash .splash-title,
        #app-splash .splash-pen path {
          animation: none;
          opacity: 1;
          transform: none;
          stroke-dashoffset: 0;
        }
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Google Fonts · 异步加载：避免首屏 render-blocking，splash 能尽早上屏 -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+Mono+TC&display=swap" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600&display=swap" media="print" onload="this.media='all'">
    <!-- 左上角标题「你我满愿」专用 · 站酷快乐体（圆胖可爱） -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" media="print" onload="this.media='all'">
    <noscript>

      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+Mono+TC&display=swap">
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600&display=swap">

    <!-- Quill 编辑器样式 · 异步加载（splash 不依赖 Quill） -->
    <link rel="stylesheet" href="./node_modules/quill/dist/quill.snow.css" media="print" onload="this.media='all'">
    <!-- defer 加载：不阻塞 HTML 解析，让 splash DOM 尽早渲染 -->
    <script defer src="./node_modules/jszip/dist/jszip.min.js"></script>
    <script defer src="./node_modules/file-saver/dist/FileSaver.min.js"></script>
</head>
<body>
    <!-- 启动 splash · 静谧纸页：DOM 淡出后由脚本移除 -->
    <div id="app-splash" aria-hidden="true">
      <div class="splash-inner">
        <div class="splash-logo"></div>
        <div class="splash-title">你我满愿</div>
        <div class="splash-pen">
          <svg viewBox="0 0 200 10" preserveAspectRatio="none" aria-hidden="true">
            <path d="M 0 5 Q 50 0, 100 5 T 200 5" />
          </svg>
        </div>
      </div>
    </div>
    <!-- splash DOM 一 parse 完就让 native launch splash 立刻淡出 200ms，让 HTML splash 的动画尽快接管 -->
    <script>
      (function () {
        try {
          var cap = window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.SplashScreen;
          if (cap && typeof cap.hide === 'function') {
            cap.hide({ fadeOutDuration: 200 });
          }
        } catch (e) {}
      })();
    </script>

                </button>
                <button id="webdav-sync-btn" class="header-icon-btn" title="云同步">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>
                </button>
                <button id="search-action-btn" class="header-icon-btn" title="搜索">

                </button>
                <button id="on-this-day-action-btn" class="header-icon-btn" title="那年今日">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>

            <div class="settings-section">

                    </div>

    <!-- Splash 双层淡出控制：
         1) DOMContentLoaded 一触发就淡出 native splash（launch theme 的静态 logo），HTML splash 接力显示
         2) load 后至少展示 MIN_SHOW_MS，让动画完整播完再整体淡出 -->
    <script>
      (function () {
        var splash = document.getElementById('app-splash');

        // ---- 先尽早隐藏 native splash，让 HTML splash 立刻接管 ----
        function hideNativeSplash() {
          try {
            var cap = window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.SplashScreen;
            if (cap && typeof cap.hide === 'function') {
              cap.hide({ fadeOutDuration: 200 });
            }
          } catch (e) {}
        }
        if (document.readyState !== 'loading') hideNativeSplash();
        else document.addEventListener('DOMContentLoaded', hideNativeSplash, { once: true });

        if (!splash) return;
        var MIN_SHOW_MS = 2600;
        var start = Date.now();
        function hideHtmlSplash() {
          var wait = Math.max(0, MIN_SHOW_MS - (Date.now() - start));
          setTimeout(function () {
            splash.classList.add('is-leaving');
            setTimeout(function () {
              if (splash && splash.parentNode) splash.parentNode.removeChild(splash);
            }, 700);
          }, wait);
        }
        if (document.readyState === 'complete') hideHtmlSplash();
        else window.addEventListener('load', hideHtmlSplash, { once: true });
      })();
    </script>
